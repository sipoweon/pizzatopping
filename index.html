function parseData() {
  const db = {};
  RAW.split('\n').forEach(line => {
    const parts = line.split(',');
    const name = parts[0].trim();
    const tagRaw = parts[1].trim();
    const tags = tagRaw.split('|').map(t => t.trim().toLowerCase());
    const pairings = parts.slice(2).map(p => p.trim()).filter(Boolean);
    db[name] = { tags, pairings };
  });
  return db;
}

const DB = parseData();

function getFilteredByExactTag(filterVal) {
  return Object.keys(DB).filter(name => {
    const tags = DB[name].tags;
    if (filterVal === 'vegan') return tags.includes('vegan');
    if (filterVal === 'veggi') return tags.includes('veggi') && !tags.includes('vegan');
    if (filterVal === 'fisch') return tags.includes('fisch');
    if (filterVal === 'fleisch') return tags.includes('fleisch');
    return false;
  });
}

function getAllowed(filterVal) {
  return new Set(Object.keys(DB).filter(name => {
    const tags = DB[name].tags;
    if (filterVal === 'vegan') return tags.includes('vegan');
    if (filterVal === 'veggi') return tags.includes('vegan') || tags.includes('veggi');
    if (filterVal === 'fisch') return tags.includes('vegan') || tags.includes('veggi') || tags.includes('fisch');
    if (filterVal === 'fleisch') return tags.includes('vegan') || tags.includes('veggi') || tags.includes('fleisch');
    return false;
  }));
}

function rand(arr) { return arr[Math.floor(Math.random() * arr.length)]; }
function normalize(s) { return s.trim().toLowerCase(); }
function pairsMatch(a, b) {
  return (DB[a]?.pairings || []).map(normalize).includes(normalize(b));
}

function generate() {
  const filterVal = document.getElementById('filter').value;
  const allowed = getAllowed(filterVal);
  const allowedArr = [...allowed];
  const primaryArr = getFilteredByExactTag(filterVal);

  if (primaryArr.length === 0 || allowedArr.length < 3) {
    showError('Zu wenige Zutaten für diesen Filter.');
    return;
  }

  let tries = 0, combo = null;
  while (tries < 800) {
    tries++;
    const t1 = rand(primaryArr);
    const p1 = (DB[t1]?.pairings || []).map(normalize);
    const candidates2 = allowedArr.filter(t => t !== t1 && p1.includes(normalize(t)));
    if (candidates2.length === 0) continue;
    const t2 = rand(candidates2);
    const bothPair = allowedArr.filter(t => t !== t1 && t !== t2 && pairsMatch(t, t1) && pairsMatch(t, t2));
    if (bothPair.length === 0) continue;
    const t3 = rand(bothPair);
    combo = [t1, t2, t3];
    break;
  }

  if (!combo) {
    showError('Keine passende Kombination gefunden. Bitte nochmal versuchen!');
    return;
  }

  const icons = ['🍅','🧄','🫑','🧅','🌿','🍄','🐟','🥩','🫒','🧀','🌶️','🥦'];
  const tDiv = document.getElementById('toppings');
  tDiv.innerHTML = combo.map((name, i) => {
    const tag = DB[name]?.tags[0] || '';
    const badge = tag === 'vegan' ? '#3B6D11' : tag === 'veggi' ? '#185FA5' : tag === 'fisch' ? '#0F6E56' : '#993C1D';
    const badgeBg = tag === 'vegan' ? '#EAF3DE' : tag === 'veggi' ? '#E6F1FB' : tag === 'fisch' ? '#E1F5EE' : '#FAECE7';
    const badgeLabel = tag === 'vegan' ? 'vegan' : tag === 'veggi' ? 'veggi' : tag === 'fisch' ? 'fisch' : 'fleisch';
    return `<div style="background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);padding:1rem 0.75rem;text-align:center;">
      <div style="font-size:22px;margin-bottom:6px;">${icons[(i*3+name.length)%icons.length]}</div>
      <div style="font-size:15px;font-weight:500;color:var(--color-text-primary);margin-bottom:6px;">${name}</div>
      <span style="font-size:11px;padding:2px 8px;border-radius:20px;background:${badgeBg};color:${badge};font-weight:500;">${badgeLabel}</span>
    </div>`;
  }).join('');

  document.getElementById('info').textContent = 'Alle drei passen geschmacklich zusammen ✓';
  document.getElementById('result-area').style.display = 'block';
  document.getElementById('empty-state').style.display = 'none';
}

function showError(msg) {
  document.getElementById('toppings').innerHTML = '';
  document.getElementById('info').textContent = msg;
  document.getElementById('result-area').style.display = 'block';
  document.getElementById('empty-state').style.display = 'none';
}
</script>
